services:
  - type: web
    name: operation-firstmover
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt && python -c "import nltk; nltk.download('punkt_tab')" && cd mini-app && npm install && npm run build && ls -la dist/ && cd ..
    startCommand: python main.py
    healthCheckPath: /health
    # Ensure only ONE instance runs (critical for Telegram polling)
    numInstances: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Force single worker — NEVER run 2+ workers with polling bot
      - key: WEB_CONCURRENCY
        value: "1"
      - key: GROQ_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: TG_BOT_TOKEN
        sync: false
      - key: TG_CHAT_ID
        sync: false
      - key: TG_API_ID
        sync: false
      - key: TG_API_HASH
        sync: false
      - key: SERP_API_KEY
        sync: false
      - key: BING_API_KEY
        sync: false
      - key: WEBSHARE_KEY
        sync: false
      - key: CF_WORKER_URL
        sync: false
      - key: CF_RELAY_SECRET
        sync: false
      - key: X_BEARER_TOKEN
        sync: false
      - key: DATABASE_PATH
        value: data/firstmover.db
      - key: LOG_LEVEL
        value: INFO
      - key: TIMEZONE
        value: Asia/Kolkata
      - key: RENDER_DEPLOY
        value: "true"
      # Grace period before starting Telegram polling (seconds).
      # Shorter now because the /close API call handles session release.
      - key: RENDER_OVERLAP_GRACE_SEC
        value: "20"
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: MINI_APP_URL
        sync: false
    plan: free
    region: oregon
