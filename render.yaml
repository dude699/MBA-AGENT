services:
  - type: web
    name: operation-firstmover
    runtime: python
    pythonVersion: "3.11.0"
    # Build: install Python deps + build mini-app frontend
    # NOTE: If Render's blueprint isn't synced, start.sh will build the mini-app at startup
    # STRATEGY: Skip tsc (it only type-checks with noEmit:true) and run vite build directly.
    #   tsc fails on Render due to NODE_ENV=production skipping @types/* devDeps.
    #   Vite uses esbuild for transpilation, not tsc, so skipping tsc is safe.
    buildCommand: "pip install --no-cache-dir -r requirements.txt && python -c \"import nltk; nltk.download('punkt_tab', quiet=True)\" && cd mini-app && npm install --include=dev --no-audit --no-fund && ./node_modules/.bin/vite build && ls -la dist/ && cd .."
    # start.sh ensures mini-app is built even if buildCommand wasn't synced from render.yaml
    startCommand: bash start.sh
    healthCheckPath: /health
    # Ensure only ONE instance runs (critical for Telegram polling)
    numInstances: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Pin Node.js v20 — Render's default may be v22 which has strict ESM issues
      # with vite.config.ts and postcss/tailwind config files
      - key: NODE_VERSION
        value: "20.19.0"
      # Force single worker — NEVER run 2+ workers with polling bot
      - key: WEB_CONCURRENCY
        value: "1"
      - key: GROQ_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: TG_BOT_TOKEN
        sync: false
      - key: TG_CHAT_ID
        sync: false
      - key: TG_API_ID
        sync: false
      - key: TG_API_HASH
        sync: false
      - key: SERP_API_KEY
        sync: false
      - key: BING_API_KEY
        sync: false
      - key: WEBSHARE_KEY
        sync: false
      - key: CF_WORKER_URL
        sync: false
      - key: CF_RELAY_SECRET
        sync: false
      - key: X_BEARER_TOKEN
        sync: false
      - key: DATABASE_PATH
        value: data/firstmover.db
      - key: LOG_LEVEL
        value: INFO
      - key: TIMEZONE
        value: Asia/Kolkata
      - key: RENDER_DEPLOY
        value: "true"
      # Grace period before starting Telegram polling (seconds).
      # Shorter now because the /close API call handles session release.
      - key: RENDER_OVERLAP_GRACE_SEC
        value: "20"
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: MINI_APP_URL
        sync: false
      # === SUPABASE (Persistent Cloud Database) ===
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # === PRISM v0.1: NEW AI Providers ===
      # OpenRouter (1M context for ATS Simulator + CV Enhancer) — FREE: 200 req/day
      # Get key at: https://openrouter.ai/keys
      - key: OPENROUTER_API_KEY
        sync: false
      # Mistral AI (Universal fallback) — FREE: 1B tokens/month
      # Get key at: https://console.mistral.ai/
      - key: MISTRAL_API_KEY
        sync: false
      # === PRISM v0.1: Email Outreach (Brevo / Sendinblue) ===
      # FREE: 300 emails/day — Get key at: https://app.brevo.com/settings/keys/api
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      # === PRISM v0.1: Email Verification (Hunter.io) ===
      # FREE: 25 searches/month — Get key at: https://hunter.io/api-keys
      - key: HUNTER_IO_KEY
        sync: false
      # === PRISM v0.1: Scraping API Fallbacks (all FREE) ===
      - key: SCRAPERAPI_KEY
        sync: false
      - key: SCRAPEDO_TOKEN
        sync: false
      - key: SCRAPINGBEE_KEY
        sync: false
      # === Schedule Mode ===
      - key: SCHEDULE_MODE
        value: weekly
      # === One-Time DB Reset ===
      # Set to "true" to wipe ALL listings (SQLite + Supabase) on next deploy.
      # MUST be removed after the reset deploy completes!
      # - key: FORCE_DB_RESET
      #   value: "true"
      # ============================================================
      # === NEXUS v0.2 — 10-Layer Stealth/Apply Architecture ===
      # ============================================================
      # Feature flag — defaults to off so existing PRISM v0.1 deploys
      # are byte-identical. Flip to "true" in the Render Dashboard
      # (Environment tab) to enable Phase 10 / Layer 0–9.
      # Render free 512MB tier boots NEXUS in LIGHT mode (in-memory DB,
      # NullAdapter triad, dashboard polling only).
      # Run scripts/nexus_bootstrap.sh on a worker dyno to enable FULL
      # mode (Camoufox + Browser-Use + Skyvern + Crawl4AI + Postgres).
      - key: NEXUS_ENABLED
        value: "false"
      # Layer 0 — Cryptographic Vault key (Fernet, 32-byte urlsafe-base64)
      - key: SESSION_VAULT_KEY
        sync: false
      # Layer 5 — Gemini 2.5 Flash for CAPTCHA T1 vision
      - key: GEMINI_API_KEY
        sync: false
      # Postgres / pgvector (apply via scripts/nexus_bootstrap.sh --step schema)
      - key: DATABASE_URL
        sync: false
      # Operator profile
      - key: NEXUS_USER_HANDLE
        sync: false
      - key: MASTER_RESUME_PATH
        sync: false
    plan: free
    region: oregon
