services:
  - type: web
    name: operation-firstmover
    runtime: python
    pythonVersion: "3.11.0"
    # Build: install Python deps + build mini-app frontend
    # NOTE: If Render's blueprint isn't synced, start.sh will build the mini-app at startup
    # STRATEGY: Skip tsc (it only type-checks with noEmit:true) and run vite build directly.
    #   tsc fails on Render due to NODE_ENV=production skipping @types/* devDeps.
    #   Vite uses esbuild for transpilation, not tsc, so skipping tsc is safe.
    buildCommand: "pip install -r requirements.txt && python -c \"import nltk; nltk.download('punkt_tab')\" && cd mini-app && npm install --include=dev --no-audit --no-fund && ./node_modules/.bin/vite build && ls -la dist/ && cd .."
    # start.sh ensures mini-app is built even if buildCommand wasn't synced from render.yaml
    startCommand: bash start.sh
    healthCheckPath: /health
    # Ensure only ONE instance runs (critical for Telegram polling)
    numInstances: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Pin Node.js v20 — Render's default may be v22 which has strict ESM issues
      # with vite.config.ts and postcss/tailwind config files
      - key: NODE_VERSION
        value: "20.19.0"
      # Force single worker — NEVER run 2+ workers with polling bot
      - key: WEB_CONCURRENCY
        value: "1"
      - key: GROQ_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: TG_BOT_TOKEN
        sync: false
      - key: TG_CHAT_ID
        sync: false
      - key: TG_API_ID
        sync: false
      - key: TG_API_HASH
        sync: false
      - key: SERP_API_KEY
        sync: false
      - key: BING_API_KEY
        sync: false
      - key: WEBSHARE_KEY
        sync: false
      - key: CF_WORKER_URL
        sync: false
      - key: CF_RELAY_SECRET
        sync: false
      - key: X_BEARER_TOKEN
        sync: false
      - key: DATABASE_PATH
        value: data/firstmover.db
      - key: LOG_LEVEL
        value: INFO
      - key: TIMEZONE
        value: Asia/Kolkata
      - key: RENDER_DEPLOY
        value: "true"
      # Grace period before starting Telegram polling (seconds).
      # Shorter now because the /close API call handles session release.
      - key: RENDER_OVERLAP_GRACE_SEC
        value: "20"
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: MINI_APP_URL
        sync: false
    plan: free
    region: oregon
