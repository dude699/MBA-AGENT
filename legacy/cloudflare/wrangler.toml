# ============================================================
# OPERATION FIRST MOVER v5 — CLOUDFLARE WORKER CONFIG
# ============================================================
# Deploy with: cd cloudflare && wrangler deploy
#
# Free tier limits:
#   - 100,000 requests/day
#   - 10ms CPU time per request
#   - 128MB memory per worker
# ============================================================

name = "firstmover-relay"
main = "relay_worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Worker limits
[limits]
cpu_ms = 50

# Set RELAY_SECRET via:
#   wrangler secret put RELAY_SECRET
# Then enter a strong random string when prompted.
# Do NOT put secrets in this file.
[vars]
ENVIRONMENT = "production"

# Route configuration (optional — only needed if using custom domain)
# [routes]
# route = "relay.yourdomain.com/*"

# Observability
[observability]
enabled = true
